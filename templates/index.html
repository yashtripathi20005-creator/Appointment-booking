<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📅 Appointment System</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="active">Home</a>
                <a href="/appointments">View Appointments</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h2>Book Your Appointment</h2>
            <p>Schedule your appointment quickly and easily</p>
        </section>

        <section class="booking-form">
            <form id="appointmentForm">
                <h3>Personal Information</h3>
                <div class="form-group">
                    <label for="user_name">Full Name *</label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>

                <div class="form-group">
                    <label for="user_email">Email *</label>
                    <input type="email" id="user_email" name="user_email" required>
                </div>

                <div class="form-group">
                    <label for="user_phone">Phone Number</label>
                    <input type="tel" id="user_phone" name="user_phone">
                </div>

                <h3>Service & Time</h3>
                <div class="form-group">
                    <label for="service_id">Select Service *</label>
                    <select id="service_id" name="service_id" required>
                        <option value="">Choose a service...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="appointment_date">Select Date *</label>
                    <input type="date" id="appointment_date" name="appointment_date" required>
                </div>

                <div class="form-group">
                    <label for="appointment_time">Select Time *</label>
                    <select id="appointment_time" name="appointment_time" required>
                        <option value="">Choose a time...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">Additional Notes</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="Any special requirements..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Book Appointment</button>
            </form>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
